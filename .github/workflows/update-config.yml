name: Update Config
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python generate_config.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add config.json
          git diff --cached --quiet || git commit -m "Update max comic number"
          git push