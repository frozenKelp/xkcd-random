<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Random XKCD Comic</title>
  <style>
    * {
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: transparent;
    }
  </style>
</head>
<body>
  <img id="comic" alt="Random XKCD comic" object-fit="contain"/>
  <script>
    fetch('config.json')
      .then(r => r.json())
      .then(config => {
        let num;
        do { num = Math.floor(Math.random() * config.max) + 1; } while (num === 404);
        return fetch(config.proxy + `https://xkcd.com/${num}/info.0.json`);
      })
      .then(r => r.json())
      .then(data => document.getElementById('comic').src = data.img)
      .catch(err => document.body.innerText = 'Error: ' + err);
  </script>
</body>
</html>
