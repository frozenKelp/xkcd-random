<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Random XKCD Comic</title>
</head>
<body>
  <img id="comic" alt="Random XKCD comic" object-fit="contain" style="width: 100%; height: 100vh;"/>
  <script>
    fetch('config.json')
      .then(r => r.json())
      .then(config => {
        let num;
        do { num = Math.floor(Math.random() * config.max) + 1; } while (num === 404);
        return fetch(config.proxy + `https://xkcd.com/${num}/info.0.json`);
      })
      .then(r => r.json())
      .then(data => document.getElementById('comic').src = data.img)
      .catch(err => document.body.innerText = 'Error: ' + err);
  </script>
</body>
</html>
